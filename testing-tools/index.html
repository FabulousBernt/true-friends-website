<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>True Friends - Testing Tools</title>
  <link rel="stylesheet" href="./tools-style.css" />
</head>
<body>
  <header>
    <img src="../img/tf-smiley-logo-transparent-coloured.svg" alt="True Friends Logo" width="100" height="100">
    <h1>TESTING TOOLS</h1>
    <p>Generators, counters, and utilities for testing</p>
  </header>

  <div class="tools-layout">
    <nav class="tools-nav">
      <button data-tool="counter-string">Counter String</button>
      <button data-tool="text-counter">Text Counter</button>
      <button data-tool="paragraph-generator">Paragraph Generator</button>
      <button data-tool="files">File Generator</button>
    </nav>

    <main id="tool-container"></main>
  </div>

  <footer>Designed by True Friends</footer>

  <script type="module" src="./testing-tools.js"></script>
</body>
</html>
